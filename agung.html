<style>
  :root {
    --ink: #111111;
    --paper: #f5f4f0;
    --steel-light: #f2f2f2;
    --steel-mid: #9e9e9e;
    --steel-dark: #3a3a3a;
    --accent: #b0231c;
    --card-bg: #1c1c1c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink);
    padding: 48px 24px 80px;
  }

  .gallery-header {
    max-width: 1000px;
    margin: 0 auto 40px;
    text-align: center;
  }

  .gallery-header .eyebrow {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--steel-dark);
    margin-bottom: 8px;
  }

  .gallery-header h1 {
    font-size: 34px;
    margin: 0 0 6px;
    letter-spacing: 1px;
  }

  .gallery-header p {
    color: #555;
    font-size: 14px;
    margin: 0;
  }

  .grid {
    max-width: 1000px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 28px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }

  .thumb {
    background:
      linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
      linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
      linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    background-color: #1c1c1c;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .thumb img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .card-body {
    padding: 18px 20px 20px;
  }

  .card-body h3 {
    font-size: 16px;
    margin: 0 0 4px;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .card-body p {
    font-size: 12.5px;
    color: #aaa;
    margin: 0 0 16px;
    line-height: 1.5;
  }

  .download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px 14px;
    background: linear-gradient(180deg, var(--steel-light), var(--steel-mid));
    color: #1a1a1a;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-decoration: none;
    border-radius: 6px;
    border: 1px solid #444;
    transition: filter 0.15s ease;
    cursor: pointer;
  }

  .download-btn:hover {
    filter: brightness(1.08);
  }

  .download-btn:active {
    filter: brightness(0.95);
  }

  .download-btn svg {
    width: 14px;
    height: 14px;
  }

  .download-btn.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  @media (max-width: 480px) {
    .gallery-header h1 { font-size: 26px; }
  }
</style>

<div class="gallery-header">
  <div class="eyebrow">Carles Fav — Logo</div>
  <h1>Pilih dan unduh logo</h1>
  <p>Klik tombol unduh di bawah setiap desain untuk menyimpan file ke perangkatmu.</p>
</div>

<div class="grid">

  <div class="card">
    <div class="thumb"><img src="https://i.ibb.co.com/M51MJpns/20260706-181352.png" alt="Logo Carles Fav"></div>
    <div class="card-body">
      <button class="download-btn" data-url="https://i.ibb.co.com/M51MJpns/20260706-181352.png" data-filename="carles-fav-logo-1.png">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
        Unduh
      </button>
    </div>
  </div>

  <div class="card">
    <div class="thumb"><img src="https://i.ibb.co.com/fd37W8T5/a-hand-drawn-black-and-white-tattoo-flas-d39x-g9b-Wx-KD5-R5m-UBUh-Og-jr-Q3dl-TWSGQ2-Zb806k4w.jpg" alt="Logo Carles Fav"></div>
    <div class="card-body">
      <button class="download-btn" data-url="https://i.ibb.co.com/v4GmVDtM/20260706-181528.png" data-filename="carles-fav-logo-2.png">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
        Unduh
      </button>
    </div>
  </div>

  <div class="card">
    <div class="thumb"><img src="https://cdn.phototourl.com/member/2026-07-06-447c90c3-725b-4ddf-a98c-ebfd5f04121d.webp" alt="Logo Carles Fav"></div>
    <div class="card-body">
      <button class="download-btn" data-url="https://cdn.phototourl.com/member/2026-07-06-447c90c3-725b-4ddf-a98c-ebfd5f04121d.webp" data-filename="carles-fav-logo-3.png">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
        Unduh
      </button>
    </div>
  </div>

</div>

<script>
  document.querySelectorAll('.download-btn').forEach(function (btn) {
    btn.addEventListener('click', async function () {
      const url = btn.getAttribute('data-url');
      const filename = btn.getAttribute('data-filename') || 'logo.png';
      const originalHTML = btn.innerHTML;

      btn.classList.add('loading');
      btn.textContent = 'Mengunduh...';

      try {
        const response = await fetch(url, { mode: 'cors' });
        if (!response.ok) throw new Error('Fetch gagal: ' + response.status);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
      } catch (err) {
        // Fallback: kalau server gambar memblokir CORS, buka di tab baru
        // supaya pengguna bisa klik kanan -> Simpan gambar sebagai...
        window.open(url, '_blank');
        alert('Unduhan otomatis diblokir oleh server gambar. Gambar dibuka di tab baru — klik kanan pada gambar lalu pilih "Simpan gambar sebagai..." untuk menyimpannya.');
      } finally {
        btn.classList.remove('loading');
        btn.innerHTML = originalHTML;
      }
    });
  });
</script>
